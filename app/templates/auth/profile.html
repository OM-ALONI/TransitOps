{% extends "base.html" %}
{% block title %}Profile — TransitOps{% endblock %}

{% block breadcrumb %}
<li class="breadcrumb-item active">My Profile</li>
{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-5">
        <div class="card border-0 shadow-sm mb-4">
            <div class="card-header bg-transparent fw-semibold">
                <i class="bi bi-person-circle"></i> Profile Details
            </div>
            <div class="card-body">
                <form method="POST" action="{{ url_for('auth.profile') }}">
                    <input type="hidden" name="action" value="update_profile">
                    <div class="mb-3">
                        <label class="form-label small fw-semibold text-uppercase">Email</label>
                        <input type="email" class="form-control bg-light" value="{{ current_user.email }}" readonly>
                    </div>
                    <div class="mb-3">
                        <label class="form-label small fw-semibold text-uppercase">Role</label>
                        <input type="text" class="form-control bg-light"
                               value="{{ current_user.role | replace('_', ' ') | title }}" readonly>
                    </div>
                    <div class="mb-3">
                        <label for="full_name" class="form-label small fw-semibold text-uppercase">Full Name</label>
                        <input type="text" class="form-control" id="full_name" name="full_name"
                               value="{{ current_user.full_name }}" required>
                    </div>
                    <button type="submit" class="btn btn-primary">Save Changes</button>
                </form>
            </div>
        </div>

        <div class="card border-0 shadow-sm mb-4">
            <div class="card-header bg-transparent fw-semibold">
                <i class="bi bi-shield-lock"></i> Change Password
            </div>
            <div class="card-body">
                <form method="POST" action="{{ url_for('auth.profile') }}" onsubmit="return validatePasswordForm()">
                    <input type="hidden" name="action" value="change_password">
                    <div class="mb-3">
                        <label for="current_password" class="form-label small fw-semibold text-uppercase">Current Password</label>
                        <input type="password" class="form-control" id="current_password"
                               name="current_password" required>
                    </div>
                    <div class="mb-3">
                        <label for="new_password" class="form-label small fw-semibold text-uppercase">New Password</label>
                        <input type="password" class="form-control" id="new_password"
                               name="new_password" required minlength="6">
                        <small class="text-muted">Minimum 6 characters</small>
                    </div>
                    <div class="mb-3">
                        <label for="confirm_password" class="form-label small fw-semibold text-uppercase">Confirm Password</label>
                        <input type="password" class="form-control" id="confirm_password"
                               name="confirm_password" required>
                    </div>
                    <button type="submit" class="btn btn-primary">Change Password</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
function validatePasswordForm() {
    var np = document.getElementById('new_password').value;
    var cp = document.getElementById('confirm_password').value;
    if (np !== cp) {
        alert('Passwords do not match.');
        return false;
    }
    if (np.length < 6) {
        alert('Password must be at least 6 characters.');
        return false;
    }
    return true;
}
</script>
{% endblock %}
