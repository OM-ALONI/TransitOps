{% extends "base.html" %}
{% block title %}Sign In — TransitOps{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <div class="auth-header">
            <a href="{{ url_for('auth.landing') }}" class="auth-back">
                <i class="bi bi-arrow-left"></i>
            </a>
            <div class="auth-icon-wrapper">
                <div class="auth-icon">
                    <i class="bi bi-truck-front-fill"></i>
                </div>
            </div>
            <h2>Welcome Back</h2>
            <p>Sign in to your TransitOps account</p>
        </div>

        <form method="POST" action="{{ url_for('auth.login') }}" id="loginForm" novalidate class="auth-form">
            <div class="mb-3">
                <label for="email" class="form-label fw-semibold small text-uppercase">Email Address</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                    <input type="email" class="form-control" id="email" name="email"
                           placeholder="you@company.com" required autofocus autocomplete="email">
                </div>
                <div class="invalid-feedback">Please enter a valid email.</div>
            </div>
            <div class="mb-4">
                <label for="password" class="form-label fw-semibold small text-uppercase">Password</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-lock"></i></span>
                    <input type="password" class="form-control" id="password" name="password"
                           placeholder="••••••••" required autocomplete="current-password" minlength="6">
                    <button class="btn btn-outline-secondary" type="button" id="togglePassword" tabindex="-1">
                        <i class="bi bi-eye"></i>
                    </button>
                </div>
                <div class="invalid-feedback">Password is required.</div>
            </div>
            <div class="d-flex justify-content-between align-items-center mb-4">
                <div class="form-check">
                    <input type="checkbox" class="form-check-input" id="remember" name="remember">
                    <label class="form-check-label small" for="remember">Remember me</label>
                </div>
            </div>
            <button type="submit" class="btn btn-primary w-100 py-2-5 fw-semibold" id="loginBtn">
                <span class="btn-text">Sign In</span>
                <span class="spinner-border spinner-border-sm d-none" role="status"></span>
            </button>
        </form>

        <div class="auth-footer">
            <p class="mb-0">
                Don't have an account?
                <a href="{{ url_for('auth.register') }}" class="fw-semibold">Create one</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
(function() {
    var form = document.getElementById('loginForm');
    var btn = document.getElementById('loginBtn');

    form.addEventListener('submit', function(e) {
        form.classList.add('was-validated');
        if (!form.checkValidity()) {
            e.preventDefault();
            e.stopPropagation();
            return;
        }
        btn.querySelector('.btn-text').classList.add('d-none');
        btn.querySelector('.spinner-border').classList.remove('d-none');
        btn.disabled = true;
    });

    document.getElementById('togglePassword').addEventListener('click', function() {
        var pw = document.getElementById('password');
        var icon = this.querySelector('i');
        if (pw.type === 'password') { pw.type = 'text'; icon.className = 'bi bi-eye-slash'; }
        else { pw.type = 'password'; icon.className = 'bi bi-eye'; }
    });
})();
</script>
{% endblock %}
