{% extends "base.html" %}
{% block title %}Register Vehicle — TransitOps{% endblock %}

{% block breadcrumb %}
<li class="breadcrumb-item"><a href="{{ url_for('vehicles.list_vehicles') }}">Vehicles</a></li>
<li class="breadcrumb-item active">Register</li>
{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-6">
        <div class="card border-0 shadow-sm">
            <div class="card-header bg-transparent">
                <h5 class="mb-0 fw-bold"><i class="bi bi-truck text-primary"></i> Register New Vehicle</h5>
            </div>
            <div class="card-body">
                <form method="POST">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label for="reg_number" class="form-label">Registration Number <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="reg_number" name="reg_number"
                                   placeholder="e.g. VAN-05" required>
                        </div>
                        <div class="col-md-6">
                            <label for="model_name" class="form-label">Model Name <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="model_name" name="model_name"
                                   placeholder="e.g. Ford Transit 350" required>
                        </div>
                        <div class="col-md-6">
                            <label for="vehicle_type" class="form-label">Vehicle Type</label>
                            <select class="form-select" id="vehicle_type" name="vehicle_type" required>
                                <option value="">Select type...</option>
                                <option value="Truck">Truck</option>
                                <option value="Van">Van</option>
                                <option value="Pickup">Pickup</option>
                                <option value="Trailer">Trailer</option>
                                <option value="Bus">Bus</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label for="max_load_kg" class="form-label">Max Load Capacity (kg) <span class="text-danger">*</span></label>
                            <input type="number" class="form-control" id="max_load_kg" name="max_load_kg"
                                   placeholder="e.g. 500" step="0.1" min="0.1" required>
                        </div>
                        <div class="col-md-4">
                            <label for="odometer" class="form-label">Odometer (km)</label>
                            <input type="number" class="form-control" id="odometer" name="odometer"
                                   value="0" step="0.1">
                        </div>
                        <div class="col-md-4">
                            <label for="acquisition_cost" class="form-label">Acquisition Cost (₹)</label>
                            <input type="number" class="form-control" id="acquisition_cost" name="acquisition_cost"
                                   value="0" step="0.01">
                        </div>
                        <div class="col-md-4">
                            <label for="status" class="form-label">Initial Status</label>
                            <select class="form-select" id="status" name="status">
                                <option value="Available">Available</option>
                                <option value="In Shop">In Shop</option>
                                <option value="Retired">Retired</option>
                            </select>
                        </div>
                    </div>
                    <div class="mt-4 d-flex gap-2">
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-check-lg"></i> Register Vehicle
                        </button>
                        <a href="{{ url_for('vehicles.list_vehicles') }}" class="btn btn-outline-secondary">
                            <i class="bi bi-x-lg"></i> Cancel
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
