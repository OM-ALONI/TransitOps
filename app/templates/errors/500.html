{% extends "base.html" %}
{% block title %}500 — TransitOps{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-6 text-center">
        <div class="card border-0 shadow-sm p-5">
            <div class="mb-4">
                <i class="bi bi-exclamation-triangle display-1 text-warning"></i>
            </div>
            <h1 class="display-4 fw-bold text-warning">500</h1>
            <h4 class="mb-3">Internal Server Error</h4>
            <p class="text-muted mb-4">
                Something went wrong on our end. Please try again later or contact support.
            </p>
            <a href="{{ url_for('dashboard.index') }}" class="btn btn-primary">
                <i class="bi bi-house-fill"></i> Back to Dashboard
            </a>
        </div>
    </div>
</div>
{% endblock %}
